name: Mudir Autopilot
on:
  schedule:
    - cron: "0 15 * * 2,4,6"   # Tue/Thu/Sat 18:00 Kuwait
  workflow_dispatch:
permissions:
  contents: write
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Preview next post
        env:
          RAW_BASE_URL: ${{ secrets.RAW_BASE_URL }}
        run: python preview.py

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    environment: instagram   # <-- requires your manual approval before it runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Publish next post
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          RAW_BASE_URL:    ${{ secrets.RAW_BASE_URL }}
        run: python publish_next.py
      - name: Record posted
        run: |
          git config user.name "mudir-autopilot"
          git config user.email "autopilot@users.noreply.github.com"
          git add posted.log || true
          git commit -m "record posted" || echo "nothing to commit"
          git push || true
